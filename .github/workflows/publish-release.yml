name: publish-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish
        required: true
        type: string
  release:
    types:
      - released

jobs:
  goreleaser:
    if: ${{ github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: publish-release-${{ inputs.release_tag || github.event.release.tag_name }}
      cancel-in-progress: false
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.17.0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.1'

      - name: Build Admin dashboard UI
        run: |
          cat <<EOF > ui/.env.production.local
          # Managed by .github/workflows/publish-release.yml
          PB_BACKEND_URL = "/"
          PB_VERSION = "${RELEASE_TAG}"
          EOF
          npm --prefix=./ui ci
          npm --prefix=./ui run build
          rm -f ui/.env.production.local

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
